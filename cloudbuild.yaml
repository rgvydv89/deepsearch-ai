steps:
  - name: 'python:3.10'
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt || true
        pip install flake8 black isort pytest

  - name: 'python:3.10'
    entrypoint: bash
    args: ['-c', 'flake8 .']

  - name: 'python:3.10'
    entrypoint: bash
    args: ['-c', 'black --check .']

  - name: 'python:3.10'
    entrypoint: bash
    args: ['-c', 'isort --check-only .']

  - name: 'python:3.10'
    entrypoint: bash
    args: ['-c', 'pytest tests/unit']

  - name: 'python:3.10'
    entrypoint: bash
    args: ['-c', 'pytest tests/evaluation']

# 🔥 FIX HERE
options:
  logging: CLOUD_LOGGING_ONLY
